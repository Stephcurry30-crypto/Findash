<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinDash Scanner & Reconciler</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000;
        }
        .apple-ui-card {
            background: #1c1c1e;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(to right, #0a84ff, #64d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .upload-option-button, #drop-zone, #reconcile-drop-zone {
            border: 2px dashed #4a4a4c;
            transition: all 0.2s ease-in-out;
            background: rgba(255, 255, 255, 0.05);
        }
        .upload-option-button:hover, #drop-zone:hover, #reconcile-drop-zone:hover {
            border-color: #0a84ff;
            color: #0a84ff;
            background-color: rgba(10, 132, 255, 0.1);
        }
        .spinner { 
            border-top-color: #0a84ff; 
            animation: spin 1s linear infinite; 
            width: 20px;
            height: 20px;
            border-width: 2px;
            border-style: solid;
            border-radius: 9999px;
            border-right-color: transparent;
            border-bottom-color: transparent;
            border-left-color: transparent;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.5s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type="date"], select {
            color-scheme: dark;
        }
        .auth-modal-backdrop {
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }
        #summary-insights-text ul {
            list-style-type: disc;
            padding-left: 1.25rem;
            color: #a0aec0;
            font-size: 0.875rem;
            line-height: 1.5;
        }
        #summary-insights-text li {
            margin-bottom: 0.5rem;
        }
        /* Custom Scrollbar for tables */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #2c2c2e; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #4a4a4c; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #636366; 
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "firebase/": "https://esm.sh/firebase@^12.7.0/",
    "country-state-city": "https://esm.sh/country-state-city@3.2.1",
    "jspdf": "https://esm.sh/jspdf@2.5.1",
    "jspdf-autotable": "https://esm.sh/jspdf-autotable@3.8.2",
    "xlsx": "https://esm.sh/xlsx-js-style@1.2.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-black flex items-center justify-center min-h-screen text-white">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
